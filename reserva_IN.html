<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Vuelos - A Volar Airline</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_reseva_IN.css">
</head>
<body>

    
    <main class="main-wrapper">
        
        <section class="search-box">
            <div class="tabs-container">
                <button class="tab-btn active" data-type="round-trip">Ida y vuelta</button>
                <button class="tab-btn" data-type="one-way">Solo ida</button>
            </div>
            
            <form class="search-grid" id="search-form">
                <div class="input-group">
                    <label>Origen</label>
                    <input type="text" id="origin" placeholder="Ciudad origen" required>
                </div>
                <div class="input-group">
                    <label>Destino</label>
                    <input type="text" id="destination" placeholder="Ciudad destino" required>
                </div>
                <div class="input-group">
                    <label>Fecha de salida</label>
                    <input type="date" id="departure-date" required>
                </div>
                
                <div class="input-group" id="return-group">
                    <label>Fecha de regreso</label>
                    <input type="date" id="return-date">
                </div>

                <div class="input-group">
                    <label>Pasajeros</label>
                    <input type="number" id="passengers" value="1" min="1">
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-buscar-form">Buscar Vuelo</button>
                </div>
            </form>
        </section>

        <section id="results-section" class="results-area" style="display: none;">
            <h2 class="results-title">Vuelos encontrados</h2>
            <div id="results-list"></div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabBtns = document.querySelectorAll('.tab-btn');
            const returnGroup = document.getElementById('return-group');
            const returnInput = document.getElementById('return-date');
            const searchForm = document.getElementById('search-form');
            const resultsSection = document.getElementById('results-section');
            const resultsList = document.getElementById('results-list');

            //  (Ida y vuelta / Solo ida)
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    if (btn.getAttribute('data-type') === 'one-way') {
                        returnGroup.style.display = 'none';
                        returnInput.required = false;
                    } else {
                        returnGroup.style.display = 'block';
                        returnInput.required = true;
                    }
                });
            });

            // Generación de tarjetas
            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const origin = document.getElementById('origin').value;
                const destination = document.getElementById('destination').value;
                const passengers = document.getElementById('passengers').value;

                resultsList.innerHTML = '';

                const flights = [
                    { id: 'AV-204', hora: '06:15 AM', clase: 'ECONÓMICA', precio: 175000 },
                    { id: 'AV-512', hora: '12:45 PM', clase: 'EJECUTIVA', precio: 380000 }
                ];

                flights.forEach(vuelo => {
                    const total = vuelo.precio * passengers;
                    const card = document.createElement('div');
                    card.className = 'flight-card';
                    card.innerHTML = `
                        <div class="flight-main-info">
                            <h3>${origin.toUpperCase()} ➔ ${destination.toUpperCase()}</h3>
                            <div class="tags-row">
                                <span class="tag">ID: ${vuelo.id}</span>
                                <span class="tag" style="background:#e8f5e9;color:#2e7d32">🕒 ${vuelo.hora}</span>
                                <span class="tag" style="background:#fce4ec;color:#8C1C4C">✈️ ${vuelo.clase}</span>
                            </div>
                        </div>
                        <div class="price-box">
                            <span class="amount">$${total.toLocaleString('es-CO')}</span>
                            <button class="btn-reservar">Seleccionar</button>
                        </div>
                    `;

                    
                    card.querySelector('.btn-reservar').addEventListener('click', () => {
                        const infoVuelo = {
                            ruta: `${origin.toUpperCase()} ➔ ${destination.toUpperCase()}`,
                            id: vuelo.id,
                            clase: vuelo.clase,
                            total: `$${total.toLocaleString('es-CO')}`
                        };
                        
                        // Guardamos en la memoria del navegador
                        localStorage.setItem('vueloSeleccionado', JSON.stringify(infoVuelo));
                        
                        // Redirigimos a la página de pago
                        window.location.href = 'finalizar_compra.html';
                    });
                    // --- FIN DE LA LÓGICA DE SELECCIÓN ---

                    resultsList.appendChild(card);
                });

                resultsSection.style.display = 'block';
            });
        });
    </script>

</body>
