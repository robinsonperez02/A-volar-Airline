<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>A Volar Airline</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-image:url("avion.jpg");
    background-size:cover;
    background-position:center;
}

/* MENU */

nav{
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 40px;
}

.logo{
    color:#7a4cc2;
    font-weight:bold;
    font-size:18px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav ul li{
    cursor:pointer;
}

nav ul li:hover{
    color:#7a4cc2;
}

/* FORMULARIO */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.login-box{
    background:#f5f5f5;
    padding:30px;
    width:320px;
    border-radius:12px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.4);
    border:2px solid black;
}

.login-box h2{
    text-align:center;
    color:#6f42c1;
}

.login-box label{
    font-size:14px;
}

.login-box input{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:20px;
    border:1px solid gray;
}

.login-box button{
    width:100%;
    padding:10px;
    background:#7a4cc2;
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.login-box button:hover{
    background:#5e36a3;
}

.registro{
    font-size:13px;
}

.registro a{
    color:#7a4cc2;
    text-decoration:none;
}

</style>

</head>


<body>

<nav>

<div class="logo">A Volar Airline</div>

<ul>
<li>Destinos</li>
<li>Ofertas</li>
<li>Check-in</li>
<li>Mi cuenta</li>
</ul>

</nav>


<div class="container">

<div class="login-box">

<h2>Iniciar sesión en su cuenta</h2>

<p class="registro">
¿no eres miembro de A Volar?
<a href="#">Únete ahora</a>
</p>

<label>correo electronico</label>
<input type="email">

<label>contraseña</label>
<input type="password">

<button>Iniciar sesión</button>

</div>

</div>


</body>
</html>
